<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Moumita 🎉</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #ff9a9e);
      font-family: 'Arial', sans-serif;
      height: 100vh;
      position: relative;
    }

    /* Background flowers & sparkles */
    .sparkle {
      position: absolute;
      color: #fff;
      font-size: 20px;
      animation: sparkleAnim 3s infinite;
      opacity: 0.8;
      pointer-events: none;
    }

    @keyframes sparkleAnim {
      0%, 100% { transform: scale(0.5) rotate(0deg); opacity: 0.4; }
      50% { transform: scale(1.5) rotate(20deg); opacity: 1; }
    }

    /* Balloons */
    .balloon {
      position: absolute;
      width: 60px;
      height: 80px;
      background: radial-gradient(circle at 40% 30%, #fff, transparent);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      animation: floatUp 8s linear infinite;
      cursor: pointer;
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 50%;
      width: 4px;
      height: 30px;
      background: #333;
    }
    .balloon1 { background-color: #ff6b6b; left: 10%; animation-duration: 7s; }
    .balloon2 { background-color: #4ecdc4; left: 25%; animation-duration: 9s; }
    .balloon3 { background-color: #45b7d1; left: 40%; animation-duration: 6s; }
    .balloon4 { background-color: #f9ca24; left: 60%; animation-duration: 8s; }
    .balloon5 { background-color: #6c5ce7; left: 75%; animation-duration: 10s; }

    @keyframes floatUp {
      0% { transform: translateY(120vh) rotate(-10deg); }
      100% { transform: translateY(-150px) rotate(10deg); }
    }

    /* Cake */
    .cake {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 140px;
      z-index: 10;
    }
    .cake-base {
      width: 100%;
      height: 60px;
      background: linear-gradient(#f8b500, #e68a00);
      border-radius: 20px 20px 10px 10px;
      position: relative;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .cake-layer {
      width: 180px;
      height: 40px;
      background: linear-gradient(#ff6b6b, #ee5a52);
      margin: 0 auto;
      border-radius: 15px 15px 5px 5px;
      position: relative;
      top: -20px;
    }
    .cake-top {
      width: 160px;
      height: 30px;
      background: linear-gradient(#4ecdc4, #3ab3a8);
      margin: 0 auto;
      border-radius: 10px;
      position: relative;
      top: -40px;
    }

    /* Candles */
    .candle {
      position: absolute;
      width: 12px;
      height: 50px;
      background: #fff;
      border-radius: 5px;
      top: -45px;
      box-shadow: 0 0 10px #ffeb3b;
    }
    .candle1 { left: 40px; }
    .candle2 { left: 90px; }
    .candle3 { left: 140px; }

    .flame {
      position: absolute;
      top: -25px;
      left: 2px;
      width: 8px;
      height: 20px;
      background: linear-gradient(#ffeb3b, #ff9800);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flameFlicker 0.4s infinite alternate;
      box-shadow: 0 0 15px #ffeb3b;
    }

    @keyframes flameFlicker {
      0% { transform: scale(1) rotate(-8deg); }
      100% { transform: scale(1.15) rotate(8deg); }
    }

    /* Main Wish Text */
    .wish {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
      z-index: 20;
    }
    .wish h1 {
      font-size: 4.5rem;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }
    .wish p {
      font-size: 2rem;
      animation: fadeIn 3s ease-in;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px #ff00ff; }
      to { text-shadow: 0 0 50px #00ffff, 0 0 70px #ff00ff; }
    }

    .name {
      font-size: 5.5rem;
      color: #ffd700;
      text-shadow: 0 0 30px #fff, 0 0 60px #ff00ff;
      animation: namePop 1.5s ease-in-out;
    }

    /* Confetti Container */
    #confetti {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    button {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 30px;
      font-size: 1.2rem;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      z-index: 30;
    }
  </style>
</head>
<body>

  <!-- Balloons -->
  <div class="balloon balloon1"></div>
  <div class="balloon balloon2"></div>
  <div class="balloon balloon3"></div>
  <div class="balloon balloon4"></div>
  <div class="balloon balloon5"></div>

  <!-- Cake -->
  <div class="cake">
    <div class="cake-top"></div>
    <div class="cake-layer"></div>
    <div class="cake-base"></div>
    
    <!-- Candles -->
    <div class="candle candle1"><div class="flame"></div></div>
    <div class="candle candle2"><div class="flame"></div></div>
    <div class="candle candle3"><div class="flame"></div></div>
  </div>

  <!-- Wish Text -->
  <div class="wish">
    <h1>Happy Birthday</h1>
    <div class="name"<h6>Moumita (موميتا)</h6></div>
    <p>Hope your special day is as wonderful as you are🌸✨<br> </p>
  </div>

  <!-- Confetti Canvas -->
  <canvas id="confetti"></canvas>

  <button onclick="launchConfetti()">Have a sweet Dreams </button>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    // Create floating sparkles / flowers
    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.textContent = ['🌸', '🌺', '✨', '💖'][Math.floor(Math.random()*4)];
      sparkle.style.left = Math.random() * 100 + 'vw';
      sparkle.style.top = Math.random() * 100 + 'vh';
      sparkle.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(sparkle);

      setTimeout(() => sparkle.remove(), 6000);
    }

    // Launch confetti
    function launchConfetti() {
      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
      });
    }

    // Balloon click → pop with confetti
    document.querySelectorAll('.balloon').forEach(balloon => {
      balloon.addEventListener('click', () => {
        launchConfetti();
        balloon.style.transition = 'all 0.4s';
        balloon.style.transform = 'scale(0.1)';
        balloon.style.opacity = '0';
        setTimeout(() => balloon.remove(), 500);
      });
    });

    // Initial animations
    setInterval(createSparkle, 300);

    // Auto confetti every few seconds
    setInterval(() => {
      if (Math.random() > 0.6) launchConfetti();
    }, 2500);

    // Keyboard support: Press 'C' for confetti
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'c') launchConfetti();
    });

    // Welcome message
    console.log("%cমৌমিতার জন্য শুভ জন্মদিন! 🎂", "color:#ff6b6b; font-size:18px; font-weight:bold;");
  </script>
</body>
</html>
